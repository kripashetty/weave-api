name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Ruff check
        run: ruff check app/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Mypy
        run: mypy app/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: weave_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/weave_test
          JWT_SECRET: dummy
          JWT_PUBLIC_KEY: dummy
          JWT_ACCESS_EXPIRY_MINUTES: 15
          JWT_REFRESH_EXPIRY_DAYS: 30
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          REDIS_URL: redis://localhost:6379
          AWS_REGION: eu-west-2
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          SQS_CALENDAR_SYNC_URL: https://example.com/calendar
          SQS_INSIGHT_RECALC_URL: https://example.com/insight
          SQS_WEEKLY_DIGEST_URL: https://example.com/digest
          SQS_TAX_DEADLINE_URL: https://example.com/tax
          SES_FROM_EMAIL: test@example.com
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
          GOOGLE_REDIRECT_URI: http://localhost:8000/callback
          SENTRY_DSN: test
          PORT: 8000
          ENVIRONMENT: test
        run: pytest
